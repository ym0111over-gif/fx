<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX実戦・究極注文ナビ</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --primary: #007AFF; --buy: #34C759; --sell: #FF3B30; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: #1C1C1E; font-size: 14px; }
        .card { background: #fff; border-radius: 24px; padding: 20px; box-shadow: 0 8px 30px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; }
        
        .step-tag { background: #555; color: #fff; font-size: 0.7rem; padding: 2px 8px; border-radius: 4px; margin-bottom: 5px; display: inline-block; }
        .label { font-weight: bold; font-size: 0.85rem; color: #444; margin-bottom: 6px; display: block; }
        input, select { width: 100%; padding: 12px; border: 2px solid #EEE; border-radius: 12px; font-size: 1.1rem; box-sizing: border-box; margin-bottom: 15px; outline: none; }
        input:focus { border-color: var(--primary); }

        /* タブ切り替え */
        .tab-grid { display: flex; gap: 8px; margin-bottom: 15px; }
        .tab-btn { flex: 1; border: 2px solid #EEE; background: #FFF; padding: 10px 0; font-weight: bold; border-radius: 12px; cursor: pointer; font-size: 0.85rem; }
        .tab-btn.active { border-color: var(--primary); color: var(--primary); background: #F0F7FF; }
        .type-btn.buy.active { background: var(--buy); color: #fff; border-color: var(--buy); }
        .type-btn.sell.active { background: var(--sell); color: #fff; border-color: var(--sell); }

        /* 計算結果エリア */
        .rec-area { background: #F0F7FF; border: 1px solid #CFE2FF; border-radius: 16px; padding: 15px; margin-bottom: 20px; text-align: center; }
        .rec-label { color: var(--primary); font-size: 0.8rem; font-weight: bold; }
        .rec-val { display: block; font-size: 1.8rem; font-weight: 900; color: var(--primary); line-height: 1.2; }
        .theory-val { font-size: 0.75rem; color: #666; display: block; margin-top: 5px; }

        /* 重要：入力エリア */
        .manual-box { border: 3px solid var(--primary); border-radius: 16px; padding: 15px; margin-bottom: 20px; background: #fff; }
        
        /* 注文スリップ（コピペ用） */
        .order-slip { background: #1C1C1E; color: #FFF; border-radius: 16px; padding: 18px; margin-top: 10px; }
        .order-row { display: flex; justify-content: space-between; margin-bottom: 12px; border-bottom: 1px solid #333; padding-bottom: 6px; }
        .order-row:last-child { border: none; }
        .order-val { font-family: monospace; font-size: 1.3rem; font-weight: bold; }
        .order-label { color: #AAA; font-size: 0.75rem; }
        .pips-val { font-size: 0.7rem; color: #888; display: block; text-align: right; }

        .disclaimer { font-size: 0.65rem; color: #999; line-height: 1.4; margin-top: 15px; border-top: 1px solid #EEE; padding-top: 10px; }
        .btn-save { width: 100%; padding: 16px; background: #444; color: #fff; border: none; border-radius: 14px; font-size: 1rem; font-weight: bold; margin-top: 15px; cursor: pointer; }
    </style>
</head>
<body>

<div class="card" id="capture-area">
    <div style="text-align:center; font-weight:bold; color:var(--primary); margin-bottom:15px; font-size: 1.2rem;">FX実戦注文ナビ</div>

    <div class="tab-grid">
        <button class="tab-btn type-btn buy active" id="btn-buy" onclick="setType('BUY')">買い (LONG)</button>
        <button class="tab-btn type-btn sell" id="btn-sell" onclick="setType('SELL')">売り (SHORT)</button>
    </div>

    <div class="tab-grid">
        <button class="tab-btn active" id="btn-mkt" onclick="setMode('MKT')">成行注文</button>
        <button class="tab-btn" id="btn-lmt" onclick="setMode('LMT')">指値注文</button>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div>
            <label class="label">手元資金 (円)</label>
            <input type="number" id="capital" value="100000" oninput="calculate()">
        </div>
        <div>
            <label class="label">最小単位 (証券会社)</label>
            <select id="min-unit" onchange="calculate()">
                <option value="1">1通貨</option>
                <option value="100">100通貨</option>
                <option value="1000" selected>1000通貨</option>
                <option value="10000">10000通貨</option>
            </select>
        </div>
    </div>

    <div id="price-section">
        <label class="label" id="price-label">現在価格 (USD/JPY)</label>
        <input type="number" id="entry-price" step="0.001" value="150.000" oninput="calculate()">
        <small id="price-hint" style="color:#888; display:block; margin-top:-10px; margin-bottom:15px; font-size:0.7rem;">現在値と同値です。成行に近い発注になります。</small>
    </div>

    <div class="rec-area">
        <span class="rec-label">実際の発注上限 (安全側)</span>
        <span class="rec-val" id="prac-units">0 通貨</span>
        <span class="theory-val" id="theory-units">理論上の最大値: 0 通貨</span>
    </div>

    <div class="manual-box">
        <label class="label" style="color:var(--primary)">★ 今回発注する数量（通貨）</label>
        <input type="number" id="manual-units" class="manual-input" placeholder="例: 3000" style="font-size:1.6rem; text-align:center; border-color:var(--primary);" oninput="calculate()">
        <small style="color:#666; font-size:0.7rem; display:block; text-align:center;">※未入力なら「実際の発注目安」で計算</small>
    </div>

    <label class="label">注文アプリへのコピペ用数値</label>
    <div class="order-slip">
        <div class="order-row">
            <span class="order-label">数量 (通貨)</span>
            <span class="order-val" id="disp-units">---</span>
        </div>
        <div class="order-row">
            <span class="order-label">指値/成行 (Price)</span>
            <span class="order-val" id="disp-entry">---</span>
        </div>
        <div class="order-row">
            <div><span class="order-label">逆指値 (損切り)</span></div>
            <div>
                <span class="order-val" style="color:var(--sell)" id="disp-sl">---</span>
                <span class="pips-val" id="pips-sl">---</span>
            </div>
        </div>
        <div class="order-row">
            <div><span class="order-label">指値 (利確)</span></div>
            <div>
                <span class="order-val" style="color:var(--buy)" id="disp-tp">---</span>
                <span class="pips-val" id="pips-tp">---</span>
            </div>
        </div>
    </div>
    
    <div class="disclaimer">
        ※相場急変時は、スプレッドの拡大やスリッページにより、実際の損失額が許容額（2%）を超える場合があります。十分注意して取引してください。
    </div>
    
    <div id="timestamp"></div>
    <button class="btn-save" id="save-btn" onclick="saveImage()">📸 トレード計画を画像で保存</button>
</div>

<script>
    let leverage = 10;
    let orderType = 'BUY'; 
    let entryMode = 'MKT'; 
    let lastMarketRate = 150.000;

    async function fetchRate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            lastMarketRate = data.rates.JPY;
            if(entryMode === 'MKT') document.getElementById('entry-price').value = lastMarketRate.toFixed(3);
            calculate();
        } catch (e) {}
    }

    function setType(type) {
        orderType = type;
        document.getElementById('btn-buy').classList.toggle('active', type === 'BUY');
        document.getElementById('btn-sell').classList.toggle('active', type === 'SELL');
        calculate();
    }

    function setMode(mode) {
        entryMode = mode;
        document.getElementById('btn-mkt').classList.toggle('active', mode === 'MKT');
        document.getElementById('btn-lmt').classList.toggle('active', mode === 'LMT');
        const hint = document.getElementById('price-hint');
        const label = document.getElementById('price-label');
        if(mode === 'MKT') {
            label.innerText = "現在価格 (USD/JPY)";
            hint.style.display = "block";
            document.getElementById('entry-price').value = lastMarketRate.toFixed(3);
        } else {
            label.innerText = "指値エントリー価格 (USD/JPY)";
            hint.style.display = "none";
        }
        calculate();
    }

    function calculate() {
        const cap = parseFloat(document.getElementById('capital').value) || 0;
        const entry = parseFloat(document.getElementById('entry-price').value) || 0;
        const minUnit = parseInt(document.getElementById('min-unit').value);
        const manual = parseFloat(document.getElementById('manual-units').value);
        
        // 1. 理論上の最大通貨数 (2%リスクベースではなくレバレッジベース)
        const theoryUnits = Math.floor((cap * leverage) / entry);
        
        // 2. 実際の発注目安 (最小単位で切り捨て)
        const practicalUnits = Math.floor(theoryUnits / minUnit) * minUnit;

        document.getElementById('theory-units').innerText = `理論上の安全目安: ${theoryUnits.toLocaleString()} 通貨`;
        document.getElementById('prac-units').innerText = `${practicalUnits.toLocaleString()} 通貨`;

        const activeUnits = (manual > 0) ? manual : practicalUnits;
        const riskJpy = cap * 0.02;

        // pips計算 
        const slDiff = activeUnits > 0 ? (riskJpy / activeUnits) : 0;
        const tpDiff = slDiff * 2;

        let slPrice = (orderType === 'BUY') ? (entry - slDiff) : (entry + slDiff);
        let tpPrice = (orderType === 'BUY') ? (entry + tpDiff) : (entry - tpDiff);

        // UI表示
        document.getElementById('disp-units').innerText = activeUnits.toLocaleString() + " 通貨";
        document.getElementById('disp-entry').innerText = entry.toFixed(3);
        document.getElementById('disp-sl').innerText = activeUnits > 0 ? slPrice.toFixed(3) : "---";
        document.getElementById('disp-tp').innerText = activeUnits > 0 ? tpPrice.toFixed(3) : "---";
        
        document.getElementById('pips-sl').innerText = activeUnits > 0 ? `${(slDiff*100).toFixed(1)} pips` : "---";
        document.getElementById('pips-tp').innerText = activeUnits > 0 ? `${(tpDiff*100).toFixed(1)} pips` : "---";
        
        document.getElementById('timestamp').innerText = "計算日時: " + new Date().toLocaleString();
    }

    function saveImage() {
        document.getElementById('save-btn').style.display = 'none';
        html2canvas(document.querySelector("#capture-area"), { scale: 2, backgroundColor: "#F2F2F7" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `FX分析_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            document.getElementById('save-btn').style.display = 'block';
        });
    }
    fetchRate();
</script>
</body>
</html>
