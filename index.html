<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FX資金管理ツール</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --primary: #007AFF; --success: #34C759; --danger: #FF3B30;
            --bg: #F2F2F7; --card: #FFFFFF; --text: #1C1C1E;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 15px; color: var(--text); line-height: 1.4; }
        .card { background: var(--card); border-radius: 24px; padding: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 480px; margin: 0 auto; }
        h1 { font-size: 1.1rem; text-align: center; margin: 0 0 20px; color: #888; letter-spacing: 1px; }
        
        .label { font-weight: bold; font-size: 0.85rem; margin-bottom: 8px; color: #555; display: block; }
        input { width: 100%; padding: 14px; border: 2px solid #E5E5EA; border-radius: 12px; font-size: 1.2rem; box-sizing: border-box; margin-bottom: 20px; transition: 0.2s; outline: none; }
        input:focus { border-color: var(--primary); background: #f9f9ff; }

        /* レバレッジ */
        .lev-grid { display: flex; gap: 6px; background: #E5E5EA; padding: 4px; border-radius: 14px; margin-bottom: 20px; }
        .lev-btn { flex: 1; border: none; background: none; padding: 12px 0; font-size: 0.9rem; font-weight: bold; cursor: pointer; border-radius: 10px; }
        .lev-btn.active { background: white; box-shadow: 0 2px 6px rgba(0,0,0,0.1); color: var(--primary); }

        /* 推奨エリア */
        .recommend-area { background: #F0F7FF; border: 1px solid #CFE2FF; border-radius: 16px; padding: 16px; text-align: center; margin-bottom: 20px; }
        .rec-units { display: block; font-size: 2.2rem; font-weight: 900; color: var(--primary); margin: 4px 0; }
        
        /* 手入力エリア */
        .manual-area { background: #FFF; border: 3px solid var(--primary); border-radius: 16px; padding: 16px; margin-bottom: 20px; position: relative; }
        .manual-area::after { content: "重要"; position: absolute; top: -12px; right: 20px; background: var(--primary); color: white; font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; }
        .manual-input { margin-bottom: 0; border: none; padding: 5px 0; border-bottom: 2px solid #EEE; border-radius: 0; font-size: 1.5rem; text-align: center; }

        /* 計算結果 */
        .res-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .res-card { background: #fdfdfd; border: 1px solid #EEE; padding: 14px; border-radius: 14px; text-align: center; }
        .res-pips { display: block; font-size: 1.4rem; font-weight: bold; margin-top: 4px; }
        
        .footer-btns { margin-top: 25px; display: flex; flex-direction: column; gap: 10px; }
        .btn-save { width: 100%; padding: 16px; background: var(--success); color: white; border: none; border-radius: 14px; font-size: 1rem; font-weight: bold; cursor: pointer; }
        #timestamp { font-size: 0.7rem; color: #AAA; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card" id="capture-area">
    <h1>FX RISK MANAGER</h1>
    
    <label class="label">手元資金 (JPY)</label>
    <input type="number" id="capital" value="100000" inputmode="numeric" oninput="calculate()">

    <label class="label">レバレッジ選択</label>
    <div class="lev-grid">
        <button class="lev-btn" onclick="setLev(1, this)">1倍</button>
        <button class="lev-btn" onclick="setLev(5, this)">5倍</button>
        <button class="lev-btn active" onclick="setLev(10, this)">10倍</button>
        <button class="lev-btn" onclick="setLev(25, this)">25倍</button>
    </div>

    <label class="label">現在レート (USD/JPY)</label>
    <input type="number" id="rate" step="0.01" value="150.00" inputmode="decimal" oninput="calculate()">

    <div class="recommend-area">
        <span class="label" style="color:var(--primary)">資金2%リスクの推奨通貨数</span>
        <span class="rec-units" id="rec-units">0</span>
        <small style="color:#666">※これを超えないように注文します</small>
    </div>

    <div class="manual-area">
        <label class="label" style="color:var(--primary)">実際の注文通貨数を入力</label>
        <input type="number" id="manual-units" class="manual-input" placeholder="例: 5000" inputmode="numeric" oninput="calculate()">
    </div>

    <div class="res-grid">
        <div class="res-card">
            <span class="label">損切り幅 (2%損)</span>
            <span class="res-pips" id="res-sl" style="color:var(--danger)">0.0 pips</span>
            <small id="risk-jpy" style="color:#999"></small>
        </div>
        <div class="res-card">
            <span class="label">利確幅 (倍返し)</span>
            <span class="res-pips" id="res-tp" style="color:var(--success)">0.0 pips</span>
            <small style="color:#999">リスク比 1:2</small>
        </div>
    </div>
    
    <div id="timestamp"></div>
    <div class="footer-btns">
        <button class="btn-save" id="save-btn" onclick="saveImage()">📸 トレード計画を画像で保存</button>
    </div>
</div>

<script>
    let leverage = 10;

    async function fetchRate() {
        try {
            const res = await fetch('https://open.er-api.com/v6/latest/USD');
            const data = await res.json();
            document.getElementById('rate').value = data.rates.JPY.toFixed(2);
            calculate();
        } catch (e) { console.log("レート取得エラー"); }
    }

    function setLev(val, btn) {
        leverage = val;
        document.querySelectorAll('.lev-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        calculate();
    }

    function calculate() {
        const cap = parseFloat(document.getElementById('capital').value) || 0;
        const rate = parseFloat(document.getElementById('rate').value) || 0;
        const manual = parseFloat(document.getElementById('manual-units').value);
        
        if (cap <= 0 || rate <= 0) return;

        // 1. 推奨（最大）通貨数
        const recUnits = Math.floor((cap * leverage) / rate);
        document.getElementById('rec-units').innerText = recUnits.toLocaleString();

        // 2. 計算に使う通貨数（手入力があれば優先、なければ推奨値）
        const activeUnits = (manual > 0) ? manual : recUnits;

        // 3. 2%リスク額
        const riskJpy = Math.floor(cap * 0.02);
        
        // 4. pips計算 (損失額 = 通貨数 * 差幅)
        const slPips = activeUnits > 0 ? (riskJpy / activeUnits) * 100 : 0;
        const tpPips = slPips * 2;

        document.getElementById('res-sl').innerText = slPips.toFixed(1) + " pips";
        document.getElementById('res-tp').innerText = tpPips.toFixed(1) + " pips";
        document.getElementById('risk-jpy').innerText = `損失額: ${riskJpy.toLocaleString()}円`;
        document.getElementById('timestamp').innerText = "計算日時: " + new Date().toLocaleString();
    }

    function saveImage() {
        const btn = document.getElementById('save-btn');
        btn.style.display = 'none';
        html2canvas(document.querySelector("#capture-area"), { scale: 2, backgroundColor: "#F2F2F7" }).then(canvas => {
            const link = document.createElement('a');
            link.download = `FX分析_${new Date().getTime()}.png`;
            link.href = canvas.toDataURL();
            link.click();
            btn.style.display = 'block';
        });
    }

    fetchRate();
</script>
</body>
</html>
